        // карусель (без изменений)
        renderCarousel: function() {
            var container = document.getElementById('carouselContainer');
            if (!container) return;
            var slides = storage.get(LS_SLIDES) || [];
            var current = 0, interval;

            function show(idx) {
                if (!slides.length || !slides[idx] || !slides[idx].img) {
                    container.innerHTML = '<div class="relative w-full h-full flex flex-col items-center justify-center bg-amber-800 text-white text-2xl p-6 text-center"><i class="fas fa-images text-6xl mb-4 opacity-50"></i><span>' + ui.t('uploadPlaceholder') + '</span><button onclick="document.getElementById(\'fileInput\').click()" class="mt-4 bg-white/20 hover:bg-white/30 px-6 py-2 rounded-full text-sm transition"><i class="fas fa-upload"></i> ' + ui.t('uploadOwn') + '</button></div>';
                    return;
                }
                var s = slides[idx];
                container.innerHTML = '<div class="relative w-full h-full" ondblclick="ui.openFull(' + idx + ', slidesData)"><img src="' + s.img + '" class="carousel-image w-full h-full object-cover" onerror="this.parentElement.innerHTML=\'<div class=\'w-full h-full flex items-center justify-center bg-amber-800 text-white text-2xl\'>' + (s.title || '') + '</div>\'"></div>';
            }

            function start() {
                if (interval) clearInterval(interval);
                if (slides.length > 1 && slides[0] && slides[0].img) {
                    interval = setInterval(function() {
                        current = (current + 1) % slides.length;
                        show(current);
                    }, 6000);
                }
            }
            window.slidesData = slides;
            show(current);
            start();

            var prev = document.getElementById('carouselPrev');
            var next = document.getElementById('carouselNext');
            if (prev && next) {
                prev.onclick = function() { if (slides.length) { current = (current - 1 + slides.length) % slides.length; show(current); start(); } };
                next.onclick = function() { if (slides.length) { current = (current + 1) % slides.length; show(current); start(); } };
            }

            var parent = container.parentElement;
            var ctrl = document.getElementById('sliderCtrl');
            if (!ctrl && parent) {
                ctrl = document.createElement('button');
                ctrl.id = 'sliderCtrl';
                ctrl.className = 'slider-control';
                ctrl.innerHTML = '<i class="fas fa-sliders-h"></i>';
                parent.appendChild(ctrl);
                var drop = document.createElement('div');
                drop.id = 'sliderDrop';
                drop.className = 'slider-dropdown';
                var up = document.createElement('button');
                up.innerHTML = '<i class="fas fa-upload"></i> ' + ui.t('uploadOwn');
                up.onclick = function(e) { e.stopPropagation(); drop.style.display = 'none'; document.getElementById('fileInput').click(); };
                var reset = document.createElement('button');
                reset.innerHTML = '<i class="fas fa-trash"></i> ' + ui.t('resetSlider');
                reset.onclick = function(e) { e.stopPropagation(); drop.style.display = 'none'; storage.remove(LS_SLIDES); ui.renderCarousel(); ui.notify('Готово', 'Слайдер сброшен', 'success'); };
                drop.appendChild(up); drop.appendChild(reset);
                parent.appendChild(drop);
                ctrl.onclick = function(e) { e.stopPropagation(); drop.style.display = (drop.style.display === 'flex') ? 'none' : 'flex'; };
                document.addEventListener('click', function(e) {
                    if (!ctrl.contains(e.target) && !drop.contains(e.target)) drop.style.display = 'none';
                });
            }
        },

        handleFileUpload: function(ev) {
            var files = ev.target.files;
            if (files.length < 3) { ui.notify('Ошибка', 'Выберите 3 изображения', 'error'); return; }
            var newSlides = [], loaded = 0;
            for (var i=0; i<3; i++) {
                var file = files[i];
                if (!file.type.startsWith('image/')) continue;
                var reader = new FileReader();
                reader.onload = function(e) {
                    newSlides.push({ title: '', desc: '', img: e.target.result });
                    loaded++;
                    if (loaded === 3) {
                        storage.set(LS_SLIDES, newSlides);
                        ui.renderCarousel();
                        ui.notify('Успех', 'Слайдер обновлён!', 'success');
                    }
                };
                reader.readAsDataURL(file);
            }
        },

                '    <div class="grid md:grid-cols-3 gap-4">' +
                '      <button onclick="ui.notify(\'' + self.t('taxReport') + '\', \'Выгрузка XML: Налоговая база за июнь 2026. Сделок: 431. Сумма: 12.4 млн TMT. Запись в блокчейн: 0x8f3a...b1d2.\', \'success\')" class="bg-indigo-100 hover:bg-indigo-200 p-4 rounded-2xl shadow text-left transition"><i class="fas fa-file-invoice text-2xl text-indigo-700"></i><h3 class="font-bold">' + self.t('taxReport') + '</h3><p class="text-sm text-gray-500">XML / PDF</p></button>' +
                '      <button onclick="ui.notify(\'' + self.t('customsReport') + '\', \'Выгрузка: Таможенные декларации. Контрактов: 89. Грузов: 245 тонн. ЭЦП: подтверждена.\', \'success\')" class="bg-blue-100 hover:bg-blue-200 p-4 rounded-2xl shadow text-left transition"><i class="fas fa-ship text-2xl text-blue-700"></i><h3 class="font-bold">' + self.t('customsReport') + '</h3><p class="text-sm text-gray-500">XML / PDF</p></button>' +
                '      <button onclick="ui.notify(\'' + self.t('presidentReport') + '\', \'📊 Сводный доклад: Рост торговли на 12.3%. Собрано налогов: 2.1 млрд TMT. Активных участников: 3 442.\', \'success\')" class="bg-red-100 hover:bg-red-200 p-4 rounded-2xl shadow text-left transition"><i class="fas fa-landmark text-2xl text-red-700"></i><h3 class="font-bold">' + self.t('presidentReport') + '</h3><p class="text-sm text-gray-500">Аналитика</p></button>' +
                '    </div>' +
                '  </div>' +
                '</div>' +
                '<footer class="py-3 text-center text-xs text-gray-600 border-t border-white/30 flex justify-between items-center px-6"><span>© 2026 ' + self.t('appTitle') + ' — ' + self.t('subtitle') + '</span><span id="footerClock" class="footer-clock"></span></footer>';
            ui.clock();
            if (window._clockInt) clearInterval(window._clockInt);
            window._clockInt = setInterval(ui.clock, 1000);

            // ----- Функция редактирования товара -----
            window.ui.showEditProduct = function(productId) {
                var product = prods.find(productId);
                if (!product) { ui.notify('Ошибка', 'Товар не найден', 'error'); return; }

                // Создаём или показываем модальное окно редактирования
                var modal = document.getElementById('editModal');
                if (!modal) {
                    modal = document.createElement('div');
                    modal.id = 'editModal';
                    modal.className = 'product-modal'; // используем тот же класс
                    modal.innerHTML =
                        '<div class="edit-modal-content bg-white p-6 rounded-2xl max-w-md w-full shadow-2xl">' +
                        '<h3 class="font-bold text-xl mb-3">' + ui.t('editProduct') + '</h3>' +
                        '<div class="edit-form">' +
                        '  <input id="editName" class="w-full border p-2 rounded mb-2" placeholder="' + ui.t('productName') + '">' +
                        '  <input id="editRetail" type="number" class="w-full border p-2 rounded mb-2" placeholder="' + ui.t('retailPrice') + '">' +
                        '  <input id="editWholesale" type="number" class="w-full border p-2 rounded mb-2" placeholder="' + ui.t('wholesalePrice') + '">' +
                        '  <input id="editImage" class="w-full border p-2 rounded mb-2" placeholder="' + ui.t('imageUrl') + '">' +
                        '  <select id="editCategory" class="w-full border p-2 rounded mb-3">' +
                        '    <option value="food">' + ui.t('food') + '</option>' +
                        '    <option value="light">' + ui.t('light') + '</option>' +
                        '    <option value="construction">' + ui.t('construction') + '</option>' +
                        '    <option value="home">' + ui.t('home') + '</option>' +
                        '  </select>' +
                        '  <div class="flex gap-2">' +
                        '    <button id="saveEditBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded transition">' + ui.t('saveChanges') + '</button>' +
                        '    <button onclick="document.getElementById(\'editModal\').style.display=\'none\'" class="bg-gray-300 hover:bg-gray-400 px-4 py-2 rounded transition">' + ui.t('cancel') + '</button>' +
                        '  </div>' +
                        '</div></div>';
                    document.body.appendChild(modal);
                    // Обработчик сохранения
                    document.getElementById('saveEditBtn').onclick = function() {
                        var id = parseInt(modal.dataset.productId);
                        var name = document.getElementById('editName').value.trim();
                        var retail = parseFloat(document.getElementById('editRetail').value);
                        var wholesale = parseFloat(document.getElementById('editWholesale').value);
                        var image = document.getElementById('editImage').value.trim();
                        var category = document.getElementById('editCategory').value;
                        if (!name || !retail || !image) {
                            ui.notify('Ошибка', 'Заполните все поля', 'error');
                            return;
                        }
                        var updated = prods.update(id, {
                            name: name,
                            retailPrice: retail,
                            wholesalePrice: wholesale || retail * 0.85,
                            image: image,
                            category: category
                        });
                        if (updated) {
                            ui.notify('Успех', ui.t('productUpdated'), 'success');
                            modal.style.display = 'none';
                            // Перерисовываем админку
                            ui.renderAdmin();
                        } else {
                            ui.notify('Ошибка', 'Не удалось обновить товар', 'error');
                        }
                    };
                }

                // Заполняем поля данными товара
                document.getElementById('editName').value = product.name;
                document.getElementById('editRetail').value = product.retailPrice;
                document.getElementById('editWholesale').value = product.wholesalePrice;
                document.getElementById('editImage').value = product.image;
                document.getElementById('editCategory').value = product.category;

                // Сохраняем ID товара в модалке
                modal.dataset.productId = productId;
                modal.style.display = 'flex';
            };
        }
    };

    // ---------- главный модуль ----------
    var app = {
        init: function() {
            console.log('Зайди удивишься v4.2 загружен');
            var user = auth.getSession();
            if (user) ui.renderMain();
            else ui.renderPublic();
        },
        navigateTo: function(view) {
            window._currentView = view;
            switch (view) {
                case 'trade': ui.renderTrade(); break;
                case 'chat': ui.renderChat(); break;
                case 'mail': ui.renderMail(); break;
                case 'pay': ui.renderPay(); break;
                case 'coin': ui.renderCoin(); break;
                case 'bank': ui.renderBank(); break;
                case 'admin': ui.renderAdmin(); break;
                default: ui.renderMain();
            }
        },
        logout: function() {
            auth.logout();
            ui.renderPublic();
        }
    };

    window.app = app;
    window.ui = ui;
    window.auth = auth;
    window.prods = prods;
    window.storage = storage;

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { app.init(); });
    } else {
        app.init();
    }

})();
</script>
</body>
</html>
